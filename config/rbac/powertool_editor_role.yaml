apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: codriverjob-editor-role
rules:
- apiGroups:
  - kubecodriver.codriverlabs.ai
  resources:
  - codriverjobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubecodriver.codriverlabs.ai
  resources:
  - codriverjobs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - kubecodriver.codriverlabs.ai
  resources:
  - codrivertools
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kubecodriver.codriverlabs.ai
  resources:
  - codrivertools/status
  verbs:
  - get
