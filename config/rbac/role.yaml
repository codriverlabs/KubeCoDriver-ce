---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  - serviceaccounts
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - ""
  resources:
  - pods
  - pods/ephemeralcontainers
  verbs:
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - serviceaccounts/token
  verbs:
  - create
- apiGroups:
  - kubecodriver.codriverlabs.ai
  resources:
  - codriverjobs
  - codrivertools
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kubecodriver.codriverlabs.ai
  resources:
  - codriverjobs/finalizers
  - codrivertools/finalizers
  verbs:
  - update
- apiGroups:
  - kubecodriver.codriverlabs.ai
  resources:
  - codriverjobs/status
  - codrivertools/status
  verbs:
  - get
  - patch
  - update
