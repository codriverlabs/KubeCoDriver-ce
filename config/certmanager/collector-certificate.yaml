apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: collector-cert
  namespace: kubecodriver-system
spec:
  secretName: kubecodriver-collector-certs
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
  subject:
    organizations:
      - CoDriver Labs
  commonName: kubecodriver-collector.kubecodriver-system.svc
  dnsNames:
    - kubecodriver-collector.kubecodriver-system.svc
    - kubecodriver-collector.kubecodriver-system.svc.cluster.local
  issuerRef:
    name: kubecodriver-collector-issuer
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: collector-issuer
  namespace: kubecodriver-system
spec:
  selfSigned: {} # For development; use CA issuer for production
