apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: tcpdump-collector-upload
spec:
  targets:
    labelSelector:
      matchLabels:
        app: database
  tool:
    name: "tcpdump"
    duration: "2m"
    args:
      - "port 3306 or port 5432"
  output:
    mode: "collector"
