apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: aperf-collector
  namespace: kubecodriver-test
spec:
  targets:
    labelSelector:
      matchLabels:
        app: nginx-cluster
    container: "main-container"
  tool:
    name: "aperf"
    duration: "10s"
    warmup: "5s"
  output:
    mode: "collector"
    collector:
      endpoint: "https://kubecodriver-collector.kubecodriver-system.svc.cluster.local:8443"
  failurePolicy:
    onError: "stop"
    backoff:
      initial: "10s"
      max: "5m"
      multiplier: "2"
