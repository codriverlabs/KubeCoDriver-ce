apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: aperf-pvc-example
  namespace: kubecodriver-test
spec:
  targets:
    labelSelector:
      matchLabels:
        app: nginx-cluster
    container: "main-container"
  tool:
    name: "aperf"
    duration: "30s"
    resolutionPreset: "high"
    maxCPUPercent: 10
  output:
    mode: "pvc"
    pvc:
      claimName: "profiling-data-pvc"
      path: "/data/profiles"
    compress: "gzip"
    retentionDays: 7
  budgets:
    maxConcurrentPods: 3
    perPodOverheadTarget: 5
