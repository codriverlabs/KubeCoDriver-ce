# CoDriverJob Conflict Resolution Test
# This example tests conflict detection when multiple CoDriverJobs target the same pods

---
# CoDriverTool for testing
apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverTool
metadata:
  name: aperf-test-config
  namespace: kubecodriver-system
spec:
  name: "aperf"
  image: "localhost:32000/codriverlabs/ce/kubecodriver-aperf:v1.0.5"
  security:
    allowPrivileged: false
    allowHostPID: false
    capabilities:
      add: ["SYS_PTRACE", "PERFMON","SYS_ADMIN"]
      drop: ["ALL"]
  description: "Test configuration for aperf profiler"
  version: "v1.0.5"

---
# First CoDriverJob - should succeed
apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: codriverjob-engineer1
  namespace: kubecodriver-test
  annotations:
    test.kubecodriver.codriverlabs.ai/scenario: "conflict-resolution"
    test.kubecodriver.codriverlabs.ai/expected: "success"
spec:
  targets:
    labelSelector:
      matchLabels:
        app: my-application
  tool:
    name: "aperf"
    duration: "60s"
  output:
    mode: "pvc"
    pvc:
      claimName: "profiling-storage"
      path: "/data/engineer1"
  budgets:
    maxConcurrentPods: 1

---
# Second CoDriverJob - should detect conflict and be rejected/queued
apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: codriverjob-engineer2
  namespace: kubecodriver-test
  annotations:
    test.kubecodriver.codriverlabs.ai/scenario: "conflict-resolution"
    test.kubecodriver.codriverlabs.ai/expected: "conflict-detected"
spec:
  targets:
    labelSelector:
      matchLabels:
        app: my-application  # Same target as engineer1
  tool:
    name: "aperf"
    duration: "30s"
  output:
    mode: "pvc"
    pvc:
      claimName: "profiling-storage"
      path: "/data/engineer2"
  budgets:
    maxConcurrentPods: 1

---
# Target pod for testing
apiVersion: v1
kind: Pod
metadata:
  name: test-application
  namespace: default
  labels:
    app: my-application
spec:
  containers:
  - name: app
    image: nginx:alpine
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "100m"

---
# PVC for test output
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: profiling-storage
  namespace: default
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
