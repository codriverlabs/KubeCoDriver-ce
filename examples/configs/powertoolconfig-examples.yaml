  version: "v1.0.5"

---
# Admin-only debugger with full access (no namespace restrictions)
apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverTool
metadata:
  name: admin-debugger-config
  namespace: kubecodriver-system
  annotations:
    codriverjob.kubecodriver.codriverlabs.ai/access-level: "admin-only"
    codriverjob.kubecodriver.codriverlabs.ai/owner: "platform-team"
    codriverjob.kubecodriver.codriverlabs.ai/security-review: "approved-2034-01-01"
spec:
  name: "admin-debugger"
  image: "localhost:32000/codriverlabs/ce/kubecodriver-debugger:v1.0.0"
  securityContext:
    allowPrivileged: true
    allowHostPID: false
    capabilities:
      add: ["SYS_ADMIN", "SYS_PTRACE", "NET_ADMIN"]
  # No allowedNamespaces = can be used anywhere (by admins only)
  description: "Administrative debugger with full system access"
  version: "v1.0.0"

