  namespace: kubecodriver-system
  annotations:
    codriverjob.kubecodriver.codriverlabs.ai/access-level: "development"
    codriverjob.kubecodriver.codriverlabs.ai/owner: "dev-team"
spec:
  name: "dev-profiler"
  image: "localhost:32000/codriverlabs/ce/kubecodriver-aperf:v1.1.0"
  securityContext:
    allowPrivileged: false
    allowHostPID: false
    capabilities:
      add: ["SYS_PTRACE"]
      drop: ["ALL"]
  allowedNamespaces:
    - "development"
    - "testing"
