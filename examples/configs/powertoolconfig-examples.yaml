# Production-only profiler with high privileges
apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverTool
metadata:
  name: prod-profiler-config
  namespace: kubecodriver-system
  annotations:
    codriverjob.kubecodriver.codriverlabs.ai/access-level: "production-only"
    codriverjob.kubecodriver.codriverlabs.ai/owner: "platform-team"
spec:
  name: "prod-profiler"
  image: "localhost:32000/codriverlabs/ce/kubecodriver-aperf:v1.0.12"
  securityContext:
    allowPrivileged: false
    allowHostPID: false
    runAsRoot: true
    capabilities:
      add: ["SYS_PTRACE", "SYS_ADMIN"]
      drop: ["ALL"]
  allowedNamespaces:
    - "production"
    - "staging"
  description: "Production profiler with enhanced capabilities"
  version: "v1.0.5"

---
# Development-safe profiler with minimal privileges
apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverTool
