apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: aperf-multicontainer-test
  namespace: kubecodriver-test
spec:
  targets:
    labelSelector:
      matchLabels:
        app: multi-test
    container: "main-app"  # Target specific container
  tool:
    name: "aperf"
    duration: "10s"
  output:
    mode: "ephemeral"
