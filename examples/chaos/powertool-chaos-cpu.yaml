apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: chaos-cpu-spike
spec:
  targets:
    labelSelector:
      matchLabels:
        app: web-server
  tool:
    name: "chaos"
    duration: "1m"
    args:
      - "cpu"
      - "90"
  output:
    mode: "collector"
    collector:
      endpoint: "https://kubecodriver-collector.kubecodriver-system.svc.cluster.local:8443"
