apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: chaos-memory-pressure
spec:
  targets:
    labelSelector:
      matchLabels:
        app: web-server
  tool:
    name: "chaos"
    duration: "1m"
    args:
      - "memory"
      - "pressure"
      - "50"
      - "linear"
  output:
    mode: "collector"
    collector:
      endpoint: "https://kubecodriver-collector.kubecodriver-system.svc.cluster.local:8443"
