apiVersion: kubecodriver.codriverlabs.ai/v1alpha1
kind: CoDriverJob
metadata:
  name: chaos-comprehensive-test
  annotations:
    description: "Comprehensive chaos engineering workflow for resilience testing"
    chaos.kubecodriver.codriverlabs.ai/experiment-type: "multi-phase"
    chaos.kubecodriver.codriverlabs.ai/risk-level: "medium"
spec:
  targets:
    labelSelector:
      matchLabels:
        app: web-server
        environment: staging  # Only run on staging
  tool:
    name: "chaos"
    duration: "5m"
    args:
      - "memory"
      - "pressure"
      - "100"
      - "oscillating"
  output:
    mode: "collector"
  # This would be part of a larger workflow where multiple CoDriverJobs
  # are executed in sequence to test different failure scenarios
