apiVersion: v1
kind: Service
metadata:
  name: kubecodriver-collector
  namespace: kubecodriver-system
spec:
  ports:
  - port: 8443
    targetPort: 8443
  selector:
    app: kubecodriver-collector
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecodriver-collector
  namespace: kubecodriver-system
spec:
  selector:
    matchLabels:
      app: kubecodriver-collector
  template:
    metadata:
      labels:
        app: kubecodriver-collector
    spec:
      serviceAccountName: kubecodriver-collector
      containers:
      - name: collector
        image: localhost:32000/codriverlabs/kubecodriver-collector:v1.0.8
        ports:
        - containerPort: 8443
        volumeMounts:
        - name: profiles-data
          mountPath: /data
        - name: service-certs
          mountPath: /certs
          readOnly: true
        env:
        - name: DATE_FORMAT
          valueFrom:
            configMapKeyRef:
              name: collector-config
              key: dateFormat
        - name: TLS_CERT_PATH
          value: /certs/tls.crt
        - name: TLS_KEY_PATH
          value: /certs/tls.key
        - name: KUBERNETES_AUDIENCE
          value: "kubecodriver-sdk-collector"
      volumes:
      - name: profiles-data
        persistentVolumeClaim:
          claimName: profiles-pvc
      - name: service-certs
        secret:
          secretName: kubecodriver-collector-certs
