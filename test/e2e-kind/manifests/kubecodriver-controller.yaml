apiVersion: v1
kind: Namespace
metadata:
  name: kubecodriver-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubecodriver-controller
  namespace: kubecodriver-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubecodriver-controller-role
rules:
- apiGroups: [""]
  resources: ["pods", "pods/ephemeralcontainers", "pods/status"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["kubecodriver.codriverlabs.ai"]
  resources: ["codriverjobs", "codriverjobs/status", "codrivertools"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubecodriver-controller-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubecodriver-controller-role
subjects:
- kind: ServiceAccount
  name: kubecodriver-controller
  namespace: kubecodriver-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubecodriver-controller-manager
  namespace: kubecodriver-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubecodriver-controller
  template:
    metadata:
      labels:
        app: kubecodriver-controller
    spec:
      serviceAccountName: kubecodriver-controller
      containers:
      - name: manager
        image: kubecodriver-controller:e2e
        imagePullPolicy: IfNotPresent
        command:
        - /manager
